    - "1. Introduction to Kubernetes":
      - part-1/01-intro/README.md
    - "2. Environment Setup & First Steps":
      - part-1/02-environment/README.md
      - 2.1 Lab: part-1/02-environment/lab.md
    - "3. Pods: The Atomic Unit of Kubernetes":
      - part-1/03-pods/README.md
      - 3.1 Lab: part-1/03-pods/lab.md
    - "4. Deployments & ReplicaSets":
      - part-1/04-deployments/README.md
      - 4.1 Lab: part-1/04-deployments/lab.md
    - "5. Services & Networking":
      - part-1/05-services/README.md
      - 5.1 Lab: part-1/05-services/lab.md
    - "6. Configuration Management: ConfigMaps & Secrets":
      - part-1/06-config/README.md
      - 6.1 Lab: part-1/06-config/lab.md
    - "7. Storage":
      - part-1/07-storage/README.md
      - 7.1 Lab: part-1/07-storage/lab.md
    - "8. Namespaces and Resource Quotas":
      - part-1/08-namespaces/README.md
      - 8.1 Lab: part-1/08-namespaces/lab.md
    - "9. kubectl and k9s essentials":
      - part-1/09-tools/README.md
      - 9.1 Lab: part-1/09-tools/lab.md
    - "10. Manifests":
      - part-1/10-manifests/README.md
    - "11. Final Lab":
