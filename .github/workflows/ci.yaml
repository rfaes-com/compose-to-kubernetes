name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      devcontainer: ${{ steps.filter.outputs.devcontainer }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            devcontainer:
              - '.devcontainer/**'

  validate-yaml:
    name: Validate Kubernetes YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Validate Part 1 YAML files
        run: |
          find docs/part-1 -name "*.yaml" -type f | while read file; do
            echo "Checking $file"
            kubectl apply --dry-run=client -f "$file" || echo "Warning: $file may need review"
          done

      - name: Validate Part 2 YAML files
        run: |
          find docs/part-2 -name "*.yaml" -type f | while read file; do
            echo "Checking $file"
            kubectl apply --dry-run=client -f "$file" || echo "Warning: $file may need review"
          done

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        run: markdownlint '**/*.md' --ignore node_modules --ignore .github || true

  check-links:
    name: Check Broken Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'

  validate-helm-charts:
    name: Validate Helm Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Lint Helm charts
        run: |
          find . -name "Chart.yaml" -type f | while read chart; do
            chart_dir=$(dirname "$chart")
            echo "Linting chart in $chart_dir"
            helm lint "$chart_dir" || echo "Warning: Chart in $chart_dir needs review"
          done

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs dependencies
        run: pip install -r docs-requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --strict --site-dir _site

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build Part 1 slides
        run: marp docs/part-1/slides.md --html --output _site/slides/part-1.html

      - name: Build Part 2 slides
        run: marp docs/part-2/slides.md --html --output _site/slides/part-2.html

  test-docker-build:
    name: Test Workshop Container Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.devcontainer == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          push: false
          tags: k8s-workshop-tools:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
